name: CI

on:
  push:
    branches: [main]
    # Pushing a tag like `v0.1.0` runs the full pipeline and then the
    # `release` job publishes the produced bundles as a GitHub Release.
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: clippy (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev libudev-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo clippy --workspace --all-targets

  test:
    name: build + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev libudev-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Tauri crate only compiles on Linux without a frontend bundle in
      # place, and cross-platform bundling is handled by the `bundle` job.
      # Everything else in the workspace is fully cross-platform.
      - name: Build workspace (Linux, full)
        if: runner.os == 'Linux'
        run: cargo build --workspace --all-targets
      - name: Build workspace (non-Linux, skip Tauri)
        if: runner.os != 'Linux'
        run: cargo build --workspace --all-targets --exclude mesh-chat-desktop

      - name: Run tests
        run: cargo test --workspace --exclude mesh-chat-desktop

  bundle:
    name: bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            bundles: "appimage,deb"
          - os: windows-latest
            target: windows
            bundles: "msi,nsis"
          - os: macos-latest
            target: macos
            bundles: "app,dmg"
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libssl-dev libudev-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libfuse2

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            ui/node_modules
          key: bundle-${{ runner.os }}-${{ hashFiles('**/Cargo.lock', 'ui/package-lock.json') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install UI deps
        working-directory: ui
        run: npm ci || npm install

      - name: Build Tauri bundle
        working-directory: src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: mesh-chat-${{ matrix.target }}
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app
          if-no-files-found: warn

  # Publishes a GitHub Release when a `v*` tag is pushed. Downloads the
  # bundles produced by the matrix above and attaches them as release
  # assets. For branch pushes the job is skipped entirely (the
  # `startsWith` guard).
  release:
    name: release (on tag)
    runs-on: ubuntu-latest
    needs: [bundle]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download bundles
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: mesh-chat-*
          merge-multiple: true
      - name: List release assets
        run: ls -lah release-assets
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-populate the body with commits since the previous tag.
          generate_release_notes: true
          # Mark pre-1.0 tags (v0.*) as prereleases so they don't overshadow
          # any future stable release on the Releases page.
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
          files: |
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.msi
            release-assets/*.exe
            release-assets/*.dmg
