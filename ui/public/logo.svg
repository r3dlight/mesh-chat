<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 160 160"
  fill="none"
  stroke-linecap="round"
  stroke-linejoin="round"
>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffc832" />
      <stop offset="1" stop-color="#3ddc84" />
    </linearGradient>
    <radialGradient id="gloss" cx="50%" cy="35%" r="50%">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)" />
      <stop offset="1" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b" />
      <feMerge>
        <feMergeNode in="b" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- concentric LoRa "waves" -->
  <g stroke="url(#g)" fill="none" filter="url(#glow)" opacity="0.85">
    <circle cx="80" cy="80" r="62" stroke-width="1" opacity="0.25" />
    <circle cx="80" cy="80" r="50" stroke-width="1" opacity="0.4" />
    <circle cx="80" cy="80" r="38" stroke-width="1" opacity="0.6" />
    <circle cx="80" cy="80" r="26" stroke-width="1.2" opacity="0.85" />
  </g>

  <!-- mesh triangle -->
  <g
    stroke="url(#g)"
    stroke-width="2.5"
    fill="none"
    filter="url(#glow)"
  >
    <!-- nodes -->
    <circle cx="80" cy="44" r="6" fill="#0b0d14" />
    <circle cx="48" cy="102" r="6" fill="#0b0d14" />
    <circle cx="112" cy="102" r="6" fill="#0b0d14" />
    <!-- links -->
    <line x1="80" y1="50" x2="48" y2="96" />
    <line x1="80" y1="50" x2="112" y2="96" />
    <line x1="54" y1="102" x2="106" y2="102" />
  </g>

  <!-- central gloss -->
  <circle cx="80" cy="80" r="62" fill="url(#gloss)" />
</svg>
